<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For You ❤️</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #fef9f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
      }
      img {
        animation: fadeIn 1.5s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .container {
        width: 90%;
        max-width: 420px;
      }

      button {
        padding: 12px 20px;
        border-radius: 20px;
        border: none;
        margin: 10px;
        cursor: pointer;
        font-size: 15px;
      }

      .primary {
        background: black;
        color: white;
      }

      .option {
        display: block;
        width: 100%;
        margin: 8px 0;
        background: #eee;
      }

      .revealed {
        background: #bbf7d0;
      }

      input {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
        width: 80%;
      }

      .no {
        background: #ddd;
        position: relative;
      }
    </style>
  </head>

  <body>
    <div class="container" id="app">
      <h1>Hey ❤️</h1>
      <p>I made something for you</p>
      <button class="primary" onclick="step1()">Start</button>
    </div>

    <script>
      // STEP 1
      function step1() {
        document.getElementById("app").innerHTML = `
    <h2>Enter your name</h2>
    <input id="name" placeholder="Your name"/>
    <br/>
    <button class="primary" onclick="goNext()">Continue</button>
  `;
      }

      function goNext() {
        let name = document.getElementById("name").value.trim();
        if (name.length < 2) return;

        step2(name);
      }

      // STEP 2 (FIXED VERSION)
      function step2(name) {
        document.getElementById("app").innerHTML = `
    <h2>${name}, tap to see what I love about you ❤️</h2>
    <div id="options"></div>
  `;

        let qualities = [
          "Your Efforts 😊",
          "Your cute little quirks & hihihi 💖",
          "The way you strike the right chords in my heart 🎶",
          "Your unexpected jokes in serious moments 😂",
          "The way you understand love 🫶",
        ];

        let container = document.getElementById("options");
        let revealedCount = 0;

        qualities.sort(() => Math.random() - 0.5);

        qualities.forEach((item) => {
          let btn = document.createElement("button");
          btn.innerText = "Tap me ✨";
          btn.className = "option";

          btn.onclick = () => {
            btn.innerText = item;
            btn.classList.add("revealed");
            btn.disabled = true;
            revealedCount++;

            if (revealedCount === qualities.length) {
              setTimeout(step3, 800);
            }
          };

          container.appendChild(btn);
        });
      }

      // STEP 3
      function step3() {
        document.getElementById("app").innerHTML = `
    <h2>Who is the most special person to me? 🌍</h2>
    <button onclick="wrong(this)">Someone else?</button>
    <button onclick="wrong(this)">Some celebrity?</button>
    <button onclick="correct()">You ❤️</button>
  `;
      }

      function wrong(btn) {
        btn.innerText = "Try again 😄";
      }

      function correct() {
        document.getElementById("app").innerHTML = `
    <h2>That’s correct ❤️</h2>
    <p style="margin-top:10px;">
      You came into my life unexpectedly…<br/>
      but you mean so much to me in so little time.
    </p>
    <button class="primary" onclick="step4()">Continue</button>
  `;
      }

      // STEP 4
      function step4() {
        document.getElementById("app").innerHTML = `
    
    <img 
      src="your-image.png" 
      alt="Proposal"
      style="
        width: 220px;
        max-width: 80%;
        margin-bottom: 20px;
      "
    />

    <h1>Anshika...I promise to love you forever ❤️</h1>
    <p>Will you be mine?</p>

    <button class="primary" onclick="yes()">YES ❤️</button>
    <button class="no" id="noBtn">No 😅</button>
  `;

        let noBtn = document.getElementById("noBtn");

        function move() {
          let x = Math.random() * 150 - 75;
          let y = Math.random() * 150 - 75;
          noBtn.style.transform = `translate(${x}px, ${y}px)`;
        }

        noBtn.addEventListener("mouseover", move);
        noBtn.addEventListener("touchstart", move);
      }

      function yes() {
        document.getElementById("app").innerHTML = `
    <h1>You just made me the happiest ❤️</h1>
    <p>I’ll always be loyal, honest, and give this my all… I promise.</p>
    <p>And I’m really glad it’s you.</p>

    <img 
      src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" 
      alt="Happy Teddy"
      style="width:200px; margin-top:20px; border-radius:12px;"
    />
  `;
      }
    </script>
  </body>
</html>
